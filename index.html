<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Career Guidance 2026</title>
    <style>
        :root {
            --bg-deep: #1e272e;
            --accent-yellow: #fbc531;
            --accent-orange: #e1b12c;
            --text-muted: #7f8fa6;
            --bar-height: 3px;
            --footer-height: 40px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            overflow: hidden;
            font-family: 'Fira Code', monospace;
            color: white;
            /* Added: Stops the phone from trying to "pull to refresh" */
            overscroll-behavior-y: contain;
            touch-action: none;
        }

        #slide-wrapper {
            position: relative;
            width: 100vw;
            height: calc(100vh - var(--footer-height));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* NEW: This layer is now the ONLY thing that sees touches */
        #touch-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2000;
            background: rgba(0,0,0,0); /* Invisible but present */
            cursor: pointer;
        }

        iframe {
            width: 100%; height: 100%;
            border: none;
            transition: opacity 0.3s ease;
            /* Added: Tells the phone to ignore touches on the iframe itself */
            pointer-events: none;
        }

        #footer-container {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            height: var(--footer-height);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }

        #progress-container {
            width: 100%;
            height: var(--bar-height);
            background: rgba(255, 255, 255, 0.05);
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--accent-orange), var(--accent-yellow));
            box-shadow: 0 0 10px rgba(251, 197, 49, 0.3);
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }

        #progress-bar::after {
            content: '';
            position: absolute;
            right: 0; top: 0;
            height: 100%; width: 4px;
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }

        #footer-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            font-size: 14px;
            color: var(--accent-orange);
            letter-spacing: 1px;
        }

        .footer-left { color: var(--accent-orange); font-weight: 400; text-transform: uppercase; }
        .footer-center { opacity: 1.0; font-size: 14px; }

        #slide-info {
            display: flex;
            align-items: baseline;
            gap: 4px;
            color: var(--text-muted);
            font-family: 'Fira Code', monospace;
        }

        #current-num { color: var(--accent-yellow); font-weight: 700; font-size: 20px; }
        #total-num { opacity: 0.5; font-size: 20px; }

    </style>
</head>
<body>

    <div id="slide-wrapper">
        <div id="touch-overlay"></div>
        <iframe id="slide-frame" src="slides/Title.html" title="Presentation Slide"></iframe>
    </div>

    <div id="footer-container">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="footer-content">
            <div class="footer-left">Mathematics in Industry</div>
            <div class="footer-center">Priyanka Magar-Sawant | PhD, Mathematics</div>
            <div id="slide-info">
                <span id="current-num">01</span>
                <span id="total-num">/ 00</span>
            </div>
        </div>
    </div>

    <script>
    const slides = ["Title.html", "Motivation.html", "CurrentWork.html", "CareerCoordinates.html", "AI_architect.html", "Guardian.html", "Simulator.html", "Optimizer.html", "Predictor.html", "Strategist.html", "Government Services.html", "MathClouds.html", "ResourceHub.html", "Resources & Strategy.html", "Professional Persona.html", "ConcludingSlide.html"];
    
    let currentIndex = 0;
    const frame = document.getElementById('slide-frame');
    const progressBar = document.getElementById('progress-bar');
    const currentLabel = document.getElementById('current-num');
    const totalLabel = document.getElementById('total-num');
    const footer = document.getElementById('footer-container');
    const overlay = document.getElementById('touch-overlay');

    totalLabel.textContent = `/ ${slides.length.toString().padStart(2, '0')}`;

    function loadSlide(index) {
        if (index < 0 || index >= slides.length) return;
        currentIndex = index;
        frame.style.opacity = '0';
        setTimeout(() => {
            frame.src = `slides/${slides[currentIndex]}`;
            updateUI();
            frame.onload = () => { frame.style.opacity = '1'; };
        }, 200);
    }

    function updateUI() {
        const percent = ((currentIndex + 1) / slides.length) * 100;
        progressBar.style.width = `${percent}%`;
        currentLabel.textContent = (currentIndex + 1).toString().padStart(2, '0');
        if (currentIndex === 0) { footer.style.opacity = '0'; } else { footer.style.opacity = '1'; }
    }

    /* KEYBOARD NAV */
    window.addEventListener('keydown', (e) => {
        if (["ArrowRight", " ", "PageDown", "n"].includes(e.key)) loadSlide(currentIndex + 1);
        if (["ArrowLeft", "PageUp", "Backspace", "p"].includes(e.key)) loadSlide(currentIndex - 1);
        if (e.key === "Escape" || e.key === "Home") loadSlide(0);
    });

    /* MOBILE TAP NAVIGATION */
    overlay.addEventListener('click', (e) => {
        const screenWidth = window.innerWidth;
        if (e.clientX > screenWidth / 2) loadSlide(currentIndex + 1);
        else loadSlide(currentIndex - 1);
    });

    /* MOBILE SWIPE NAVIGATION */
    let startX = 0;
    overlay.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive: true});
    overlay.addEventListener('touchend', e => {
        let endX = e.changedTouches[0].clientX;
        if (startX - endX > 50) loadSlide(currentIndex + 1);
        if (endX - startX > 50) loadSlide(currentIndex - 1);
    }, {passive: true});

    window.addEventListener('message', (e) => {
        const requestedSlide = e.data;
        const newIndex = slides.indexOf(requestedSlide);
        if (newIndex !== -1) loadSlide(newIndex);
    });

    updateUI();
</script>
</body>
</html>
