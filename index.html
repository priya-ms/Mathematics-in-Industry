<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Career Guidance 2026</title>
    <style>
        :root {
            --bg-deep: #1e272e;
            --accent-yellow: #fbc531;
            --accent-orange: #e1b12c;
            --text-muted: #7f8fa6;
            --bar-height: 3px;
            --footer-height: 40px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            overflow: hidden;
            font-family: 'Fira Code', monospace;
            color: white;
            touch-action: none; /* Prevents browser from scrolling/zooming */
        }

        /* MAIN SLIDE AREA */
        #slide-wrapper {
            position: relative;
            width: 100vw;
            height: calc(100vh - var(--footer-height));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* NEW: Invisible overlay to capture touches on mobile/laptop */
        #touch-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 500;
            background: transparent;
        }

        iframe {
            width: 100%; height: 100%;
            border: none;
            transition: opacity 0.3s ease;
        }

        /* FOOTER SYSTEM */
        #footer-container {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            height: var(--footer-height);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }

        #progress-container {
            width: 100%;
            height: var(--bar-height);
            background: rgba(255, 255, 255, 0.05);
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--accent-orange), var(--accent-yellow));
            box-shadow: 0 0 10px rgba(251, 197, 49, 0.3);
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }

        #footer-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            font-size: 14px;
            color: var(--accent-orange);
        }

        #slide-info {
            display: flex;
            align-items: baseline;
            gap: 4px;
            color: var(--text-muted);
        }

        #current-num { color: var(--accent-yellow); font-weight: 700; font-size: 20px; }
        #total-num { opacity: 0.5; font-size: 20px; }

    </style>
</head>
<body>

    <div id="slide-wrapper">
        <div id="touch-overlay"></div>
        <iframe id="slide-frame" src="slides/Title.html" title="Presentation Slide"></iframe>
    </div>

    <div id="footer-container">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="footer-content">
            <div class="footer-left">Mathematics in Industry</div>
            <div class="footer-center">Priyanka Magar-Sawant | PhD, Mathematics</div>
            <div id="slide-info">
                <span id="current-num">01</span>
                <span id="total-num">/ 00</span>
            </div>
        </div>
    </div>

<script>
    const slides = ["Title.html", "Motivation.html", "CurrentWork.html", "CareerCoordinates.html", "AI_architect.html", "Guardian.html", "Simulator.html", "Optimizer.html", "Predictor.html", "Strategist.html", "Government Services.html", "MathClouds.html", "ResourceHub.html", "Resources & Strategy.html", "Professional Persona.html", "ConcludingSlide.html"];
    
    let currentIndex = 0;
    const frame = document.getElementById('slide-frame');
    const progressBar = document.getElementById('progress-bar');
    const currentLabel = document.getElementById('current-num');
    const totalLabel = document.getElementById('total-num');
    const footer = document.getElementById('footer-container');
    const overlay = document.getElementById('touch-overlay');

    totalLabel.textContent = `/ ${slides.length.toString().padStart(2, '0')}`;

    function loadSlide(index) {
        if (index < 0 || index >= slides.length) return;
        currentIndex = index;
        frame.style.opacity = '0';
        setTimeout(() => {
            frame.src = `slides/${slides[currentIndex]}`;
            updateUI();
            frame.onload = () => { frame.style.opacity = '1'; };
        }, 200);
    }

    function updateUI() {
        const percent = ((currentIndex + 1) / slides.length) * 100;
        progressBar.style.width = `${percent}%`;
        currentLabel.textContent = (currentIndex + 1).toString().padStart(2, '0');
        if (currentIndex === 0) { footer.style.opacity = '0'; } else { footer.style.opacity = '1'; }
    }

    /* 1. KEYBOARD NAV (For Laptop) */
    window.addEventListener('keydown', (e) => {
        if (["ArrowRight", " ", "PageDown", "n"].includes(e.key)) loadSlide(currentIndex + 1);
        if (["ArrowLeft", "PageUp", "Backspace", "p"].includes(e.key)) loadSlide(currentIndex - 1);
    });

    /* 2. TOUCH NAV (For Phone) - SWIPE DETECTION */
    let touchstartX = 0;
    let touchendX = 0;

    overlay.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
    }, false);

    overlay.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        handleGesture();
    }, false);

    function handleGesture() {
        if (touchendX < touchstartX - 50) loadSlide(currentIndex + 1); // Swipe Left -> Next
        if (touchendX > touchstartX + 50) loadSlide(currentIndex - 1); // Swipe Right -> Prev
    }

    /* 3. CLICK NAV (For Laptop Mouse) */
    overlay.addEventListener('click', (e) => {
        if (e.clientX > window.innerWidth / 2) loadSlide(currentIndex + 1);
        else loadSlide(currentIndex - 1);
    });

    updateUI();
</script>
</body>
</html>
