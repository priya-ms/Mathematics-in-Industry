<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Career Guidance 2026</title>
    <style>
        :root {
            --bg-deep: #1e272e;
            --accent-yellow: #fbc531;
            --accent-orange: #e1b12c;
            --text-muted: #7f8fa6;
            --bar-height: 3px;
            --footer-height: 40px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            overflow: hidden;
            font-family: 'Fira Code', monospace;
            color: white;
            /* Added: Prevents double-tap zoom on some mobile browsers */
            touch-action: manipulation;
        }

        /* MAIN SLIDE AREA - Pushed up to clear footer */
        #slide-wrapper {
            width: 100vw;
            height: calc(100vh - var(--footer-height));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            width: 100%; height: 100%;
            border: none;
            transition: opacity 0.3s ease;
            /* Added: Ensures touches pass through to the main window if needed */
            pointer-events: auto;
        }

        /* MERGED FOOTER SYSTEM */
        #footer-container {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            height: var(--footer-height);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }

        /* PROGRESS BAR MOVED TO BOTTOM (TOP OF FOOTER) */
        #progress-container {
            width: 100%;
            height: var(--bar-height);
            background: rgba(255, 255, 255, 0.05);
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--accent-orange), var(--accent-yellow));
            box-shadow: 0 0 10px rgba(251, 197, 49, 0.3);
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }

        #progress-bar::after {
            content: '';
            position: absolute;
            right: 0; top: 0;
            height: 100%; width: 4px;
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }

        /* FOOTER CONTENT AREA */
        #footer-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            font-size: 14px;
            color: var(--accent-orange);
            letter-spacing: 1px;
        }

        .footer-left {
            color: var(--accent-orange);
            font-weight: 400;
            text-transform: uppercase;
        }

        .footer-center {
            opacity: 1.0;
            font-size: 14px;
        }

        /* INTEGRATED SLIDE COUNTER */
        #slide-info {
            display: flex;
            align-items: baseline;
            gap: 4px;
            color: var(--text-muted);
            font-family: 'Fira Code', monospace;
        }

        #current-num { color: var(--accent-yellow); font-weight: 700; font-size: 20px; }
        #total-num { opacity: 0.5; font-size: 20px; }

    </style>
</head>
<body>

    <div id="slide-wrapper">
        <iframe id="slide-frame" src="slides/Title.html" title="Presentation Slide"></iframe>
    </div>

    <div id="footer-container">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        
        <div id="footer-content">
            <div class="footer-left">Mathematics in Industry</div>
            
            <div class="footer-center">
                Priyanka Magar-Sawant | PhD, Mathematics (IIT Bombay Alumnus)
            </div>

            <div id="slide-info">
                <span id="current-num">01</span>
                <span id="total-num">/ 00</span>
            </div>
        </div>
    </div>

    <script>
    const slides = [
        "Title.html",
        "Motivation.html",
        "CurrentWork.html",
        "CareerCoordinates.html",
        "AI_architect.html",
        "Guardian.html",
        "Simulator.html",
        "Optimizer.html",
        "Predictor.html",
        "Strategist.html",
        "Government Services.html",
        "MathClouds.html",
        "ResourceHub.html",
        "Resources & Strategy.html",
        "Professional Persona.html",
        "ConcludingSlide.html"
    ];
    
    let currentIndex = 0;
    const frame = document.getElementById('slide-frame');
    const progressBar = document.getElementById('progress-bar');
    const currentLabel = document.getElementById('current-num');
    const totalLabel = document.getElementById('total-num');
    const footer = document.getElementById('footer-container');

    totalLabel.textContent = `/ ${slides.length.toString().padStart(2, '0')}`;

    function loadSlide(index) {
        if (index < 0 || index >= slides.length) return;
        
        currentIndex = index;
        frame.style.opacity = '0';
        
        setTimeout(() => {
            frame.src = `slides/${slides[currentIndex]}`;
            updateUI();
            
            frame.onload = () => { 
                frame.style.opacity = '1'; 
                window.focus(); 
            };
        }, 200);
    }

    function updateUI() {
        const percent = ((currentIndex + 1) / slides.length) * 100;
        progressBar.style.width = `${percent}%`;
        currentLabel.textContent = (currentIndex + 1).toString().padStart(2, '0');

        if (currentIndex === 0) {
            footer.style.opacity = '0';
            footer.style.pointerEvents = 'none';
        } else {
            footer.style.opacity = '1';
            footer.style.pointerEvents = 'auto';
        }
    }

    /* KEYBOARD NAVIGATION */
    window.addEventListener('keydown', (e) => {
        if (["ArrowRight", " ", "PageDown", "n"].includes(e.key)) {
            e.preventDefault();
            loadSlide(currentIndex + 1);
        }
        
        if (["ArrowLeft", "PageUp", "Backspace", "p"].includes(e.key)) {
            e.preventDefault();
            loadSlide(currentIndex - 1);
        }

        if (e.key === "Escape" || e.key === "Home") {
            loadSlide(0);
        }
    });

    /* MOBILE TOUCH NAVIGATION */
    // Added: Detects a tap on the right 50% of the screen to go next, left 50% for back
    document.addEventListener('touchstart', (e) => {
        const touchX = e.touches[0].clientX;
        const screenWidth = window.innerWidth;

        if (touchX > screenWidth / 2) {
            loadSlide(currentIndex + 1);
        } else {
            loadSlide(currentIndex - 1);
        }
    }, false);

    window.addEventListener('message', (e) => {
        const requestedSlide = e.data;
        const newIndex = slides.indexOf(requestedSlide);
        if (newIndex !== -1) loadSlide(newIndex);
    });

    document.addEventListener('click', () => window.focus());
    
    updateUI();
</script>
</body>
</html>
