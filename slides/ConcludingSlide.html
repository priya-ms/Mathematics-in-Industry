<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connect & Grow</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Lato:wght@300;400;700&family=Merriweather:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #353b48;
            --panel-bg: #2f3640;
            --text-main: #f5f6fa;
            --text-muted: #dcdde1;
            --accent-yellow: #e1b12c;
            --accent-orange: #e67e22;
            --accent-green: #2ecc71; 
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Lato', sans-serif; 
            margin: 0; height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; color: var(--text-main);
        }

        .header-section { text-align: center; margin-bottom: 5vh; z-index: 2; }
        h1 { font-family: 'Merriweather', serif; font-size: 4.5vh; color: var(--accent-yellow); margin: 0; }
        .subtitle { font-family: 'Fira Code', monospace; font-size: 2vh; color: var(--text-muted); margin-top: 1.5vh; }

        .connect-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4vw;
            width: 70vw; max-width: 1000px; z-index: 2;
        }

        .connect-card {
            background: var(--panel-bg); border-radius: 6px; padding: 4vh;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            position: relative; transition: transform 0.3s ease;
        }

        .connect-card:nth-child(1) { border-top: 3px solid var(--accent-yellow); }
        .connect-card:nth-child(2) { border-top: 3px solid #0077b5; }

        .qr-frame {
            width: 18vh; height: 18vh; background: white; padding: 1vh;
            border-radius: 4px; margin-bottom: 2.5vh; position: relative; overflow: hidden;
        }

        .qr-img { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 20%;
            background: linear-gradient(to bottom, transparent, rgba(46, 204, 113, 0.6), transparent);
            border-bottom: 2px solid #2ecc71; animation: scanQR 3s ease-in-out infinite;
        }

        .card-title { font-family: 'Merriweather', serif; font-size: 2.2vh; font-weight: 700; margin-bottom: 0.8vh; }
        .card-desc { font-size: 1.6vh; color: var(--text-muted); margin-bottom: 2vh; line-height: 1.4; }
        .card-link { font-family: 'Fira Code', monospace; font-size: 1.6vh; color: var(--accent-orange); text-decoration: none; border-bottom: 1px dotted var(--accent-orange); }

        .footer-info { margin-top: 6vh; display: flex; flex-direction: column; gap: 2vh; align-items: center; z-index: 5; }
        .status-badge { padding: 0.5vh 1.5vh; border: 1px solid var(--accent-green); color: var(--accent-green); border-radius: 4px; font-size: 2.1vh; font-family: 'Fira Code', monospace; }

        /* FIXED: Corrected color and added pointer-events */
        .download-badge a {
            padding: 0.5vh 1.5vh;
            border: 1px solid var(--accent-green);
            color: var(--accent-green); 
            border-radius: 4px;
            font-size: 2.1vh;
            background: rgba(46, 204, 113, 0.05);
            font-family: 'Fira Code', monospace;
            text-decoration: none;
            display: inline-block;
            pointer-events: auto;
        }

        @keyframes scanQR { 0% { top: -20%; } 100% { top: 120%; } }
    </style>
</head>
<body>
    <div class="header-section">
        <h1>Let's Keep in Touch</h1>
        <div class="subtitle">Scan to save resources & connect</div>
    </div>

    <div class="connect-container">
        <div class="connect-card">
            <div class="qr-frame">
                <img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://priya-ms.github.io/" alt="Website QR">
                <div class="scan-line"></div>
            </div>
            <div class="card-title">Resources & Notes</div>
            <div class="card-desc">Access the reading list and math material.</div>
            <a href="https://priya-ms.github.io/" target="_blank" class="card-link">priya-ms.github.io</a>
        </div>

        <div class="connect-card">
            <div class="qr-frame">
                <img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.linkedin.com/in/priyankamagarsawant" alt="LinkedIn QR">
                <div class="scan-line" style="border-color: #0077b5;"></div>
            </div>
            <div class="card-title">Connect on LinkedIn</div>
            <div class="card-desc">Feel free to reach out for guidance.</div>
            <a href="https://www.linkedin.com/in/priyankamagarsawant" target="_blank" class="card-link">Dr. Priyanka Magar-Sawant</a>
        </div>
    </div>

    <div class="footer-info">
        <div class="status-badge">● Q&A Session Open</div>
    </div>
</body>
</html>
