<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connect & Grow - Industrial Graphite</title>
    <!-- Theme Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Lato:wght@300;400;700&family=Merriweather:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --bg-color: #353b48;
            --panel-bg: #2f3640;
            --text-main: #f5f6fa;
            --text-muted: #dcdde1;
            
            --accent-yellow: #e1b12c;
            --accent-orange: #e67e22;
            --accent-green: #2ecc71; 
            
            --border-color: #57606f;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Lato', sans-serif; 
            margin: 0; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* CANVAS BACKGROUND */
        #networkCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* HEADER */
        .header-section { text-align: center; margin-bottom: 5vh; z-index: 2; }
        
        h1 { 
            font-family: 'Merriweather', serif;
            font-size: 4.5vh; 
            color: var(--accent-yellow); 
            margin: 0; 
            font-weight: 700; 
            letter-spacing: -0.5px;
            opacity: 0; animation: fadeIn 1.5s forwards;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-family: 'Fira Code', monospace; 
            font-size: 2vh; 
            color: var(--text-muted); 
            margin-top: 1.5vh;
            font-weight: 400;
            opacity: 0; animation: fadeIn 1.5s forwards 0.5s;
        }

        /* CONTAINER */
        .connect-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Left and Right split */
            gap: 4vw;
            width: 70vw;
            max-width: 1000px;
            z-index: 2;
        }

        /* CARD STYLING */
        .connect-card {
            background: var(--panel-bg);
            border-radius: 6px;
            padding: 4vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            position: relative;
            transition: transform 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 1s ease-out forwards;
            backdrop-filter: blur(5px);
        }
        
        /* Subtle accent lines */
        .connect-card:nth-child(1) { animation-delay: 0.2s; border-top: 3px solid var(--accent-yellow); }
        .connect-card:nth-child(2) { animation-delay: 0.4s; border-top: 3px solid #0077b5; }

        .connect-card:hover { transform: translateY(-5px); background: #333b44; }

        /* QR FRAME */
        .qr-frame {
            width: 18vh; height: 18vh;
            background: white;
            padding: 1vh;
            border-radius: 4px;
            margin-bottom: 2.5vh;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Real QR Image Styling */
        .qr-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        
        /* Laser Scanner Animation */
        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 20%;
            background: linear-gradient(to bottom, transparent, rgba(46, 204, 113, 0.6), transparent);
            border-bottom: 2px solid #2ecc71;
            box-shadow: 0 0 10px #2ecc71;
            animation: scanQR 3s ease-in-out infinite;
            opacity: 0.8;
        }

        .card-title { 
            font-family: 'Merriweather', serif; 
            font-size: 2.2vh; 
            font-weight: 700; 
            color: var(--text-main); 
            margin-bottom: 0.8vh; 
        }
        
        .card-desc { 
            font-size: 1.6vh; 
            color: var(--text-muted); 
            margin-bottom: 2vh; 
            font-weight: 300; 
            line-height: 1.4;
        }
        
        .card-link { 
            font-family: 'Fira Code', monospace; 
            font-size: 1.6vh; 
            color: var(--accent-orange); 
            text-decoration: none; 
            border-bottom: 1px dotted var(--accent-orange); 
            transition: all 0.2s;
            word-break: break-word; 
        }
        .card-link:hover { color: white; border-color: white; }

        /* FOOTER INFO */
        .footer-info {
            margin-top: 6vh;
            text-align: center;
            font-family: 'Lato', sans-serif;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 1s forwards 1.2s;
            display: flex;
            flex-direction: column;
            gap: 2vh;
            align-items: center;
            z-index: 2;
        }

        .status-badge {
            padding: 0.5vh 1.5vh;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            border-radius: 4px;
            font-size: 2.1vh;
            background: rgba(46, 204, 113, 0.05);
            font-family: 'Fira Code', monospace;
            animation: pulseBadge 2s infinite;
        }

        .download-badge a{
            padding: 0.5vh 1.5vh;
            border: 1px solid var(--accent-green);
            color: var(--accent-green)e;
            border-radius: 4px;
            font-size: 2.1vh;
            background: rgba(46, 204, 113, 0.05);
            font-family: 'Fira Code', monospace;
            animation: pulseBadge 2s infinite;
        }

        .email-section {
            font-size: 1.8vh;
            font-weight: 300;
        }
        
        .email-link { color: var(--text-main); text-decoration: none; font-weight: 400; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .email-link:hover { color: var(--accent-yellow); border-color: var(--accent-yellow); }

        .quote {
            font-size: 1.5vh; 
            color: #7f8c8d; 
            margin-top: 1vh; 
            font-style: italic;
            font-family: 'Merriweather', serif;
        }

        /* ANIMATIONS */
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes scanQR { 
            0% { top: -20%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 120%; opacity: 0; } 
        }
        @keyframes pulseBadge { 
            0% { box-shadow: 0 0 0 rgba(46, 204, 113, 0); } 
            50% { box-shadow: 0 0 10px rgba(46, 204, 113, 0.2); } 
            100% { box-shadow: 0 0 0 rgba(46, 204, 113, 0); } 
        }

    </style>
</head>
<body>

    <!-- Network Constellation Background -->
    <canvas id="networkCanvas"></canvas>

    <div class="header-section">
        <h1>Let's Keep in Touch</h1>
        <div class="subtitle">Scan to save resources & connect</div>
    </div>

    <div class="connect-container">
        
        <!-- LEFT: WEBSITE -->
        <div class="connect-card">
            <div class="qr-frame">
                <!-- Auto-generated QR for your Website -->
                <img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://priya-ms.github.io/priya-math-web/#about" alt="Website QR">
                <div class="scan-line"></div>
            </div>
            <div class="card-title">Resources & Notes</div>
            <div class="card-desc">Access the reading list, and some math material.</div>
            <a href="https://priya-ms.github.io/" target="_blank" class="card-link">priya-ms.github.io</a>
        </div>

        <!-- RIGHT: LINKEDIN -->
        <div class="connect-card">
            <div class="qr-frame">
                <!-- Auto-generated QR for your LinkedIn -->
                <img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.linkedin.com/in/priyanka-magar-sawant-083177345/" alt="LinkedIn QR">
                <div class="scan-line" style="animation-delay: 1.5s; border-color: #0077b5; box-shadow: 0 0 10px #0077b5; background: linear-gradient(to bottom, transparent, rgba(0, 119, 181, 0.6), transparent);"></div>
            </div>
            <div class="card-title">Connect on LinkedIn</div>
            <div class="card-desc">Feel free to reach out for guidance.</div>
            <a href="https://www.linkedin.com/in/priyanka-magar-sawant-083177345/" target="_blank" class="card-link">Dr. Priyanka Magar-Sawant</a>
        </div>

    </div>

    <div class="footer-info">
        <div class="status-badge">● Q&A Session Open</div>
<div class="download-badge">
    <a href="https://github.com/priya-ms/Mathematics-in-Industry/raw/main/Mathematics-in-Industry-Slides.zip" download>
        Download Slides
    </a>
</div>


</body>
</html>
