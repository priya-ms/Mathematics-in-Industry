<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title Slide - Industrial Graphite</title>
    <!-- Theme Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&family=Lato:wght@300;400;700&family=Merriweather:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --bg-color: #353b48;       /* Cool Graphite Grey */
            --accent-yellow: #e1b12c;
            --accent-orange: #e67e22;
            --text-main: #f5f6fa;
            --text-muted: #b2bec3;
        }

        body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Lato', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        /* --- 3D ANIMATED BACKGROUND --- */
        .grid-floor {
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 5s linear infinite;
            z-index: 0;
            /* Fade out at the horizon */
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
        }

        @keyframes moveGrid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* --- CONTENT CONTAINER --- */
        .content-wrapper {
            z-index: 2;
            text-align: center;
            padding: 5vh;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(47, 54, 64, 0.8); /* Semi-transparent panel */
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 900px;
            position: relative;
        }

        /* Corner Accents */
        .content-wrapper::before {
            content: ''; position: absolute; top: 0; left: 0; width: 30px; height: 30px;
            border-top: 3px solid var(--accent-yellow); border-left: 3px solid var(--accent-yellow);
        }
        .content-wrapper::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 30px; height: 30px;
            border-bottom: 3px solid var(--accent-yellow); border-right: 3px solid var(--accent-yellow);
        }

        /* TYPOGRAPHY */
        h1 {
            font-family: 'Merriweather', serif;
            font-size: 6vh;
            color: var(--accent-yellow);
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(225, 177, 44, 0.3);
            line-height: 1.2;
        }

        .subtitle {
            font-family: 'Fira Code', monospace;
            font-size: 2.2vh;
            color: var(--accent-orange);
            margin-top: 2vh;
            margin-bottom: 4vh;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: inline-block;
            padding-bottom: 10px;
        }

        /* SPEAKER INFO */
        .speaker-box {
            display: flex;
            flex-direction: column;
            gap: 1vh;
            color: var(--text-main);
        }

        .name { font-size: 3vh; font-weight: 700; letter-spacing: 1px; }
        .designation { font-size: 2vh; font-weight: 300; color: var(--text-muted); }
        .affiliation { font-size: 2vh; font-weight: 400; color: var(--text-main); }
        
        .meta-info {
            margin-top: 4vh;
            font-family: 'Fira Code', monospace;
            font-size: 2.1vh; /* Slightly smaller */
            color: var(--accent-yellow);
            line-height: 1.5; /* Better spacing */
            opacity: 0.9;
        }

        /* DECORATIVE ELEMENTS */
        .math-symbol {
            position: absolute;
            color: rgba(255,255,255,0.03);
            font-family: 'Merriweather', serif;
            font-weight: 900;
            user-select: none;
            z-index: 1;
        }

    </style>
</head>
<body>

    <!-- 3D Background Grid -->
    <div class="grid-floor"></div>


    <div class="content-wrapper">
        <!-- EDIT TITLE HERE -->
        <h1>Mathematics in Industry</h1>
        
        <!-- EDIT SUBTITLE HERE -->
        <div class="subtitle">Bridging Theory & Application</div>

    <div class="speaker-box">
        <div class="name">Priyanka Magar-Sawant, Ph.D.</div>
        <div class="designation">Mathematician, Raphe mPhibr Pvt. Ltd.</div>
        <div class="affiliation">IIT Bombay Alumna</div> </div>

        <div class="meta-info">
            <!-- EDIT DATE/EVENT -->
            IIT Jodhpur<br>
            08 March 2026
        </div>
    </div>

</body>
</html>
